config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

# ─────────────────────────────────────────────────────────────────────────────
# Comments
# ─────────────────────────────────────────────────────────────────────────────
comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false          # Handled by Spotless licenseHeaderFile
  DocumentationOverPrivateFunction:
    active: false
  DocumentationOverPrivateProperty:
    active: false
  DeprecatedBlockTag:
    active: true
  EndOfSentenceFormat:
    active: false
  KDocReferencesNonPublicProperty:
    active: true
  OutdatedDocumentation:
    active: true
  UndocumentedPublicClass:
    active: false          # Too noisy for a desktop/UI codebase
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

# ─────────────────────────────────────────────────────────────────────────────
# Complexity
# ─────────────────────────────────────────────────────────────────────────────
complexity:
  active: true
  CognitiveComplexMethod:
    active: true
    allowedComplexity: 20          # was threshold
  ComplexCondition:
    active: true
    allowedConditions: 5           # was threshold
  ComplexInterface:
    active: false
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 15          # was threshold
  LabeledExpression:
    active: true
  LargeClass:
    active: true
    allowedLines: 600              # was threshold; excludes/ignoreAnnotated removed in 2.x
  LongMethod:
    active: true
    allowedLines: 80               # was threshold; excludes/ignoreAnnotated removed in 2.x
  LongParameterList:
    active: true
    allowedFunctionParameters: 8   # was functionThreshold
    allowedConstructorParameters: 8 # was constructorThreshold
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter: ['Composable']  # was ignoreAnnotated
  MethodOverloading:
    active: false
  NamedArguments:
    active: false
  NestedBlockDepth:
    active: true
    allowedDepth: 5                # was threshold
  NestedScopeFunctions:
    active: true
    allowedDepth: 3                # was threshold
  ReplaceSafeCallChainWithRun:
    active: true
  StringLiteralDuplication:
    active: false
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 60         # was allowedFunctionsInFile
    allowedFunctionsPerClass: 30        # was allowedFunctionsInClass
    allowedFunctionsPerObject: 30       # was allowedFunctionsInObject
    allowedFunctionsPerInterface: 15    # was allowedFunctionsInInterface
    allowedFunctionsPerEnum: 10         # was allowedFunctionsInEnum
    ignoreDeprecated: true
    ignorePrivate: true
    ignoreAnnotatedFunctions: ['Composable']  # was ignoreAnnotated
    excludes: ['**/build.gradle.kts']

# ─────────────────────────────────────────────────────────────────────────────
# Coroutines
# ─────────────────────────────────────────────────────────────────────────────
coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true           # ban GlobalScope — use structured concurrency
  InjectDispatcher:
    active: true           # dispatchers should be injected, not hardcoded
    dispatcherNames: ['IO', 'Default', 'Unconfined']
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true           # Thread.sleep blocks the coroutine thread pool
  SuspendFunSwallowedCancellation:
    active: true
  SuspendFunWithCoroutineScopeReceiver:
    active: true

# ─────────────────────────────────────────────────────────────────────────────
# Empty blocks
# ─────────────────────────────────────────────────────────────────────────────
empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|ignored|expected'
  EmptyClassBlock:
    active: true
  EmptyDefaultConstructor:
    active: true
  EmptyDoWhileBlock:
    active: true
  EmptyElseBlock:
    active: true
  EmptyFinallyBlock:
    active: true
  EmptyForBlock:
    active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
  EmptyIfBlock:
    active: true
  EmptyInitBlock:
    active: true
  EmptyKotlinFile:
    active: true
  EmptySecondaryConstructor:
    active: true
  EmptyTryBlock:
    active: true
  EmptyWhenBlock:
    active: true
  EmptyWhileBlock:
    active: true

# ─────────────────────────────────────────────────────────────────────────────
# Exceptions
# ─────────────────────────────────────────────────────────────────────────────
exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  InstanceOfCheckForException:
    active: true
  NotImplementedDeclaration:
    active: true
  ObjectExtendsThrowable:
    active: true
  PrintStackTrace:
    active: true           # leaks stack traces to stdout instead of structured logging
  RethrowCaughtException:
    active: true
  ReturnFromFinally:
    active: true
  SwallowedException:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|ignored|expected'
  ThrowingExceptionFromFinally:
    active: true
  ThrowingExceptionInMain:
    active: false          # CLI main functions intentionally throw
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Spec.kt']
  ThrowingNewInstanceOfSameException:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'NullPointerException'
      - 'IndexOutOfBoundsException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|ignored|expected'
    excludes: ['**/test/**', '**/*Test.kt']
  TooGenericExceptionThrown:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

# ─────────────────────────────────────────────────────────────────────────────
# Naming
# ─────────────────────────────────────────────────────────────────────────────
naming:
  active: true
  BooleanPropertyNaming:
    active: true
    allowedPattern: '^(is|has|are|can|should|was|will|use)[A-Z].*'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    privateParameterPattern: '[a-z][A-Za-z0-9]*'
  EnumNaming:
    active: true
    enumEntryPattern: '[A-Z][_A-Z0-9]*'
  ForbiddenClassName:
    active: false
  FunctionNameMaxLength:
    active: false
  FunctionNameMinLength:
    active: false
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    excludeClassPattern: '$^'
    ignoreAnnotated: ['Composable']  # Composable functions are PascalCase by convention
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
  InvalidPackageDeclaration:
    active: true
  LambdaParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*|_'
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true
  NoNameShadowing:
    active: true
  NonBooleanPropertyPrefixedWithIs:
    active: true
  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'
  VariableMaxLength:
    active: false
  VariableMinLength:
    active: true
    minimumVariableNameLength: 1
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'

# ─────────────────────────────────────────────────────────────────────────────
# Performance
# ─────────────────────────────────────────────────────────────────────────────
performance:
  active: true
  ArrayPrimitive:
    active: true
  CouldBeSequence:
    active: true
    allowedOperations: 3               # was threshold
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true
    excludes:
      - '**/test/**'
      - '**/*Test.kt'
  UnnecessaryPartOfBinaryExpression:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true

# ─────────────────────────────────────────────────────────────────────────────
# Potential bugs
# ─────────────────────────────────────────────────────────────────────────────
potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'
  CastToNullableType:
    active: true
  Deprecation:
    active: false          # Too noisy with third-party libraries
  DontDowncastCollectionTypes:
    active: true
  DoubleMutabilityForCollection:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  EqualsWithHashCodeExist:
    active: true
  ExitOutsideMain:
    active: true
    excludes: ['**/cli/**']   # CLI is allowed to call exitProcess
  HasPlatformType:
    active: true
  IgnoredReturnValue:
    active: true
    restrictToConfig: true
    returnValueAnnotations: ['CheckResult', 'CheckReturnValue']
  ImplicitDefaultLocale:
    active: true
  ImplicitUnitReturnType:
    active: true
    allowExplicitReturnType: true
  InvalidRange:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  LateinitUsage:
    active: false          # Koin inject uses lateinit
  MapGetWithNotNullAssertionOperator:
    active: true
  MissingPackageDeclaration:
    active: true
    excludes: ['**/*.kts']
  NullCheckOnMutableProperty:
    active: true
  NullableToStringCall:
    active: true
  PropertyUsedBeforeDeclaration:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnnecessaryNotNullCheck:
    active: true
  UnnecessaryNotNullOperator:
    active: true
  UnnecessarySafeCall:
    active: true
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
    excludes: ['**/test/**', '**/*Test.kt']
  UnsafeCast:
    active: true
  UnusedUnaryOperator:
    active: true
  UselessPostfixExpression:
    active: true
  WrongEqualsTypeParameter:
    active: true

# ─────────────────────────────────────────────────────────────────────────────
# Style
# ─────────────────────────────────────────────────────────────────────────────
style:
  active: true
  AlsoCouldBeApply:
    active: true
  BracesOnIfStatements:
    active: false          # Handled by ktlint
  BracesOnWhenStatements:
    active: false
  CanBeNonNullable:
    active: true
  CascadingCallWrapping:
    active: false
  ClassOrdering:
    active: false
  CollapsibleIfStatements:
    active: true
  DataClassContainsFunctions:
    active: false
  DataClassShouldBeImmutable:
    active: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5
  EqualsNullCall:
    active: true
  EqualsOnSignatureLine:
    active: false
  ExplicitCollectionElementAccessMethod:
    active: true
  ExplicitItLambdaParameter:
    active: true
  ExpressionBodySyntax:
    active: false          # matter of taste; don't enforce
  ForbiddenAnnotation:
    active: false
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Use a GitHub issue instead of a FIXME comment.'
        value: 'FIXME:'
      - reason: 'STOPSHIP comments must be resolved before release.'
        value: 'STOPSHIP:'
    allowedPatterns: ''
  ForbiddenImport:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
    forbiddenImports:                  # was imports
      - reason: 'Use kotlinx.coroutines.GlobalScope alternatives with structured concurrency.'
        value: 'kotlinx.coroutines.GlobalScope'
      - reason: 'Use kotlin.io.println only in CLI main; avoid in library/UI code.'
        value: 'java.io.PrintStream'
  ForbiddenMethodCall:
    active: false
  ForbiddenSuppress:
    active: false
  ForbiddenVoid:
    active: true
    ignoreOverridden: true
    ignoreUsageInGenerics: true
  FunctionOnlyReturningConstant:
    active: true
  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 2
  MagicNumber:
    active: false
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreExtensionFunctions: true
  MandatoryBracesLoops:
    active: false
  MaxChainedCallsOnSameLine:
    active: false
  MaxLineLength:
    active: false          # Handled by ktlint / .editorconfig
  MayBeConstant:                       # was MayBeConst
    active: true
  ModifierOrder:
    active: true
  MultilineLambdaItParameter:
    active: true
  MultilineRawStringIndentation:
    active: false
  NestedClassesVisibility:
    active: true
  NewLineAtEndOfFile:
    active: false          # Handled by Spotless
  NoTabs:
    active: false          # Handled by Spotless
  NullableBooleanCheck:
    active: true
  ObjectLiteralToLambda:
    active: true
  OptionalAbstractKeyword:
    active: true
  OptionalUnit:
    active: false
  RangeUntilInsteadOfRangeTo:          # was UntilInsteadOfRangeTo
    active: true
  ProtectedMemberInFinalClass:
    active: true
  RedundantExplicitType:
    active: false
  RedundantHigherOrderMapUsage:
    active: true
  RedundantVisibilityModifier:         # was RedundantVisibilityModifierRule
    active: false
  ReturnCount:
    active: true
    max: 4
    excludedFunctions: ['equals']
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: true
  SafeCast:
    active: true
  SerialVersionUIDInSerializableClass:
    active: false          # Using kotlinx.serialization, not Java Serializable
  SpacingAfterPackageAndImports:       # was SpacingBetweenPackageAndImports
    active: false          # Handled by ktlint
  StringShouldBeRawString:
    active: false
  ThrowsCount:
    active: true
    max: 3
    excludeGuardClauses: true
  TrailingWhitespace:
    active: false          # Handled by Spotless
  TrimMultilineRawString:
    active: true
  UnderscoresInNumericLiterals:
    active: true
    acceptableLength: 5
    allowNonStandardGrouping: false
  UnnecessaryApply:
    active: true
  UnnecessaryBackticks:
    active: true
  UnnecessaryBracesAroundTrailingLambda:
    active: true
  UnnecessaryFilter:
    active: true
  UnnecessaryInheritance:
    active: true
  UnnecessaryInnerClass:
    active: true
  UnnecessaryLet:
    active: true
  UnnecessaryParentheses:
    active: true
  UnusedImport:                        # was UnusedImports
    active: false          # ktlint handles this
  UnusedParameter:
    active: true
    allowedNames: '_|ignored|expected'
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:               # was part of UnusedPrivateMember
    active: true
    allowedNames: '_|ignored|expected'
  UnusedPrivateProperty:
    active: true
    allowedNames: '_|ignored|expected'
  UseAnyOrNoneInsteadOfFind:
    active: true
  UseArrayLiteralsInAnnotations:
    active: true
  UseCheckNotNull:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
  UseCheckOrError:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
  UseDataClass:
    active: false
  UseEmptyCounterpart:
    active: true
  UseIfEmptyOrIfBlank:
    active: true
  UseIfInsteadOfWhen:
    active: true
    ignoreWhenContainingVariableDeclaration: true
  UseIsNullOrEmpty:
    active: true
  UseLet:
    active: false
  UseOrEmpty:
    active: true
  UseRequire:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
  UseRequireNotNull:
    active: true
    excludes: ['**/test/**', '**/*Test.kt', '**/*Tests.kt', '**/*Spec.kt', '**/*TestBase.kt']
  UseSumOfInsteadOfFlatMapSize:
    active: true
  VarCouldBeVal:
    active: true
    ignoreLateinitVar: true
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.android.synthetic.*'
      - 'androidx.compose.*'
